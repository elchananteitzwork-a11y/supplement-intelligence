<div class="w-full max-w-[400px] bg-surface-container-lowest border border-primary p-gutter space-y-element-gap">

<button class="w-full flex items-center justify-center gap-3 bg-white border border-primary text-primary font-bold py-3 uppercase tracking-wider hover:bg-surface-container transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">login</span>

<!-- Continue with Apple -->
<button class="w-full flex items-center justify-center gap-3 bg-white border border-primary text-primary font-bold py-3 uppercase tracking-wider hover:bg-surface-container transition-colors active:scale-95 duration-75">

                </button>
</div>

<div class="space-y-2">
<label class="text-label-mono font-label-mono text-secondary uppercase block" for="email">Work Email</label>
<input class="w-full bg-white border-2 border-primary p-3 focus:outline-none focus:ring-0 focus:border-primary placeholder:text-outline-variant text-body-md font-body-md shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]" id="email" placeholder="name@company.com" type="email"/>
</div>
<button class="w-full bg-black text-white font-bold py-4 uppercase tracking-widest border-2 border-black hover:bg-white hover:text-black transition-colors duration-200 active:scale-95" type="submit">
                    Email me a sign-in link

</form>

<!-- Micro-interaction for input shadow -->
<script>
        const emailInput = document.getElementById('email');
        emailInput.addEventListener('focus', () => {
            emailInput.style.boxShadow = 'none';
            emailInput.style.transform = 'translate(2px, 2px)';
        });
        emailInput.addEventListener('blur', () => {
            emailInput.style.boxShadow = '2px 2px 0px 0px rgba(0,0,0,1)';
            emailInput.style.transform = 'translate(0px, 0px)';
        });
    </script>
