<script>
        // Simple countdown logic for the disabled button demo
        let timeLeft = 27;
        const resendBtn = document.querySelector('.secondary-btn-disabled');
        
        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                resendBtn.textContent = `Resend in ${timeLeft}s`;
            } else {
                resendBtn.textContent = "Resend link";
                resendBtn.classList.remove('secondary-btn-disabled', 'cursor-not-allowed');
                resendBtn.classList.add('neo-card', 'hover:bg-surface-container-high', 'transition-colors', 'cursor-pointer');
                resendBtn.removeAttribute('disabled');
                clearInterval(countdown);
            }
        }, 1000);
    </script>
